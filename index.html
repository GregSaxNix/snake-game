<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }
    h1 { font-size: 1.5rem; color: #94a3b8; }
    .score-bar {
      display: flex;
      gap: 2rem;
      font-size: 0.875rem;
      color: #64748b;
    }
    .score-bar span { color: #3b82f6; font-weight: bold; }
    canvas {
      border: 2px solid #334155;
      border-radius: 8px;
      background: #1e293b;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: #475569;
    }
    .controls kbd {
      background: #334155;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: monospace;
    }
    #game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }
    #game-over.show { display: flex; }
    #game-over h2 { font-size: 2rem; color: #ef4444; }
    #game-over p { color: #94a3b8; }
    #game-over button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    #game-over button:hover { background: #2563eb; }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <div class="score-bar">
    <div>Score: <span id="score">0</span></div>
    <div>High Score: <span id="high-score">0</span></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <kbd>Arrow Keys</kbd> or <kbd>WASD</kbd> to move &bull; <kbd>Space</kbd> to pause
  </div>

  <div id="game-over">
    <h2>Game Over</h2>
    <p>Score: <span id="final-score">0</span></p>
    <button onclick="startGame()">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 20;
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;

    let snake, direction, nextDirection, food, score, highScore, gameLoop, paused, speed;

    highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
    document.getElementById('high-score').textContent = highScore;

    function startGame() {
      snake = [{ x: 10, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      speed = 120;
      paused = false;
      document.getElementById('score').textContent = '0';
      document.getElementById('game-over').classList.remove('show');
      placeFood();
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(s => s.x === food.x && s.y === food.y));
    }

    function tick() {
      if (paused) return;
      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Wall collision
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
        return gameOver();
      }

      // Self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        return gameOver();
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById('score').textContent = score;
        placeFood();
        // Speed up every 5 points
        if (score % 5 === 0 && speed > 50) {
          speed -= 10;
          clearInterval(gameLoop);
          gameLoop = setInterval(tick, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#1e293b';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid (subtle)
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 0.5;

      // Draw snake
      snake.forEach((segment, i) => {
        const brightness = Math.max(0.4, 1 - (i / snake.length) * 0.6);
        ctx.fillStyle = `rgba(59, 130, 246, ${brightness})`;
        ctx.beginPath();
        ctx.roundRect(
          segment.x * GRID + 1,
          segment.y * GRID + 1,
          GRID - 2,
          GRID - 2,
          3
        );
        ctx.fill();
      });

      // Draw food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(
        food.x * GRID + GRID / 2,
        food.y * GRID + GRID / 2,
        GRID / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();

      // Pause indicator
      if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e2e8f0';
        ctx.font = '24px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
      }
    }

    function gameOver() {
      clearInterval(gameLoop);
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', String(highScore));
        document.getElementById('high-score').textContent = highScore;
      }
      document.getElementById('final-score').textContent = score;
      document.getElementById('game-over').classList.add('show');
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      switch (key) {
        case 'arrowup': case 'w':
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
          break;
        case 'arrowdown': case 's':
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
          break;
        case 'arrowleft': case 'a':
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
          break;
        case 'arrowright': case 'd':
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
          break;
        case ' ':
          paused = !paused;
          if (!paused) draw();
          else draw(); // Redraw with pause overlay
          break;
      }
    });

    startGame();
  </script>
</body>
</html>
